<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Подписка — ЦТ/ЦЭ</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="subscribe-screen">
        <div class="page-header">
            <a href="index.html" class="back-btn">←</a>
            <h2 class="page-title">Подписка</h2>
        </div>

        <div style="text-align:center; margin-bottom:24px;">
            <div style="font-size:48px; margin-bottom:12px;">⭐</div>
            <p style="font-size:15px; font-weight:600;">Выберите план подписки</p>
        </div>

        <div class="subscribe-plans">
    <button class="plan-btn" data-plan="1d">
        <span class="plan-name">1 день</span>
        <span class="plan-price">15 ⭐</span>
    </button>
    <button class="plan-btn" data-plan="5d">
        <span class="plan-name">5 дней</span>
        <span class="plan-price">60 ⭐</span>
    </button>
    <button class="plan-btn" data-plan="7d">
        <span class="plan-name">7 дней</span>
        <span class="plan-price">70 ⭐</span>
    </button>
    <button class="plan-btn" data-plan="14d">
        <span class="plan-name">14 дней</span>
        <span class="plan-price">100 ⭐</span>
    </button>
    <button class="plan-btn" data-plan="30d">
        <span class="plan-name">30 дней <small style="opacity:0.6">(выгодно)</small></span>
        <span class="plan-price">150 ⭐</span>
    </button>
    <button class="plan-btn" data-plan="forever">
        <span class="plan-name">Навсегда ♾️</span>
        <span class="plan-price">750 ⭐</span>
    </button>
</div>

        <p class="subscribe-note">
            Оплата через Telegram Stars.<br>
            Функция будет подключена позже.
        </p>
    </div>

    <script src="js/telegram.js"></script>
    <script src="js/api.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/subscribe.js"></script>


</body>
</html>
